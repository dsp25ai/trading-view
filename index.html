<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>d$p QUANT-FORCE Systematic Dashboard</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
--bg: #ffffff;
--card: #f8f9fa;
--border: #e0e0e0;
--text: #1a1a1a;
--muted: #6c757d;
--primary: #0066cc;
--green: #28a745;
--red: #dc3545;
--yellow: #ffc107;
--font-mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
.nav-search { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; width: 300px; }
.nav-search input { background: transparent; border: none; color: var(--text); outline: none; font-size: 0.9rem; width: 100%; }
.dashboard { max-width: 1800px; margin: 2rem auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 400px; gap: 2rem; }
.main-pane { display: flex; flex-direction: column; gap: 1.5rem; }
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
.stat-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; min-height: 120px; }
.stat-label { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
.stat-value { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 700; margin-top: 0.5rem; }
.chart-pane { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; min-height: 550px; }
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.ticker-info { display: flex; align-items: center; gap: 1rem; }
.ticker-symbol { font-size: 1.4rem; font-weight: 800; }
.time-tabs { display: flex; gap: 0.5rem; }
.time-tab { background: transparent; border: none; color: var(--muted); padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
.time-tab.active { background: var(--primary); color: white; }
#chart { height: 450px; }
.side-panel { display: flex; flex-direction: column; gap: 1.5rem; }
.panel-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; }
.section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
.watchlist-table { width: 100%; }
.watchlist-table th { text-align: left; font-size: 0.75rem; color: var(--muted); padding: 0.5rem; border-bottom: 1px solid var(--border); }
.watchlist-table td { padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.flow-bar { height: 20px; border-radius: 4px; background: linear-gradient(to right, var(--green) 0%, var(--green) 50%, var(--red) 50%, var(--red) 100%); margin: 1rem 0; }
.log-entry { padding: 0.75rem; background: var(--bg); border-radius: 4px; margin-bottom: 0.5rem; font-size: 0.85rem; }
.status-optimal { color: var(--green); font-weight: 700; }
</style>
</head>
<body>
<nav>
<div class="logo">d$p QUANT-FORCE MCP</div>
<div class="nav-search"><span>\ud83d\udd0d</span><input type="text" placeholder="TICKER" id="tickerInput"></div>
<div class="status-optimal">SYSTEM: OPTIMAL</div>
</nav>
<div class="dashboard">
<div class="main-pane">
<div class="stats-bar">
<div class="stat-item"><div class="stat-label">MARKET CONTEXT (MCP)</div><div class="stat-value" id="mcp">BULLISH</div></div>
<div class="stat-item"><div class="stat-label">GLOBAL ALPHA SCORE</div><div class="stat-value" id="alpha">84.2</div></div>
<div class="stat-item"><div class="stat-label">SYSTEM VIX IMPACT</div><div class="stat-value" id="vix">14.22</div></div>
<div class="stat-item"><div class="stat-label">TOTAL SMART FLOW</div><div class="stat-value" id="flow">$2.4B</div></div>
</div>
<div class="chart-pane">
<div class="chart-header">
<div class="ticker-info"><span class="ticker-symbol" id="currentTicker">NVDA</span></div>
<div class="time-tabs">
<button class="time-tab" data-period="1m">1m</button>
<button class="time-tab" data-period="5m">5m</button>
<button class="time-tab active" data-period="1h">1h</button>
<button class="time-tab" data-period="D">D</button>
</div>
</div>
<div id="chart"></div>
</div>
</div>
<div class="side-panel">
<div class="panel-section">
<div class="section-title">Asset Intelligence (Watchlist)</div>
<table class="watchlist-table">
<thead><tr><th>TICKER</th><th>PRICE</th><th>CHANGE</th><th>RSI</th><th>ALPHA</th><th>STATUS</th></tr></thead>
<tbody id="watchlist-body"></tbody>
</table>
</div>
<div class="panel-section">
<div class="section-title">LIVE OPTIONS FLOW \ud83d\udd25</div>
<div class="flow-bar"></div>
</div>
<div class="panel-section">
<div class="section-title">DARK POOL/BLOCKS</div>
<div id="darkpool-feed"></div>
</div>
<div class="panel-section">
<div class="section-title">ALGO LOG</div>
<div id="algo-log"></div>
</div>
</div>
</div>
<script>
const API_KEY = 'csebmepr01qtt21e0dc0csebmepr01qtt21e0dcg';
let chart;
let candleSeries;
let currentSymbol = 'NVDA';

function initChart() {
chart = LightweightCharts.createChart(document.getElementById('chart'), {
width: document.getElementById('chart').clientWidth,
height: 450,
layout: { background: { color: '#f8f9fa' }, textColor: '#1a1a1a' },
grid: { vertLines: { color: '#e0e0e0' }, horzLines: { color: '#e0e0e0' } },
timeScale: { borderColor: '#e0e0e0' }
});
candleSeries = chart.addCandlestickSeries({ upColor: '#28a745', downColor: '#dc3545', borderVisible: false, wickUpColor: '#28a745', wickDownColor: '#dc3545' });
}

async function fetchQuote(symbol) {
try {
const url = 'https://finnhub.io/api/v1/quote?symbol=' + symbol + '&token=' + API_KEY;
const response = await fetch(url);
const data = await response.json();
return data;
} catch (error) {
console.error('Quote error:', error);
return { c: 135.25, d: 2.45, dp: 1.85, h: 137.89, l: 134.12, o: 135.0, pc: 132.8 };
}
}

async function fetchCandles(symbol, resolution, from, to) {
try {
const url = 'https://finnhub.io/api/v1/stock/candle?symbol=' + symbol + '&resolution=' + resolution + '&from=' + from + '&to=' + to + '&token=' + API_KEY;
const response = await fetch(url);
const data = await response.json();
if (data.s === 'ok') {
const candles = [];
for (let i = 0; i < data.t.length; i++) {
candles.push({ time: data.t[i], open: data.o[i], high: data.h[i], low: data.l[i], close: data.c[i] });
}
return candles;
}
return generateMockCandles();
} catch (error) {
console.error('Candle error:', error);
return generateMockCandles();
}
}

function generateMockCandles() {
const candles = [];
const now = Math.floor(Date.now() / 1000);
let price = 135;
for (let i = 100; i >= 0; i--) {
const time = now - (i * 3600);
const open = price;
const change = (Math.random() - 0.5) * 5;
const close = price + change;
const high = Math.max(open, close) + Math.random() * 2;
const low = Math.min(open, close) - Math.random() * 2;
candles.push({ time: time, open: open, high: high, low: low, close: close });
price = close;
}
return candles;
}

async function loadChart(symbol, resolution) {
const to = Math.floor(Date.now() / 1000);
const from = to - (100 * 3600);
const candles = await fetchCandles(symbol, resolution || '60', from, to);
candleSeries.setData(candles);
}

async function updateWatchlist() {
const symbols = ['AAPL', 'TSLA', 'NVDA', 'MSFT', 'GOOGL'];
const tbody = document.getElementById('watchlist-body');
tbody.innerHTML = '';
for (const sym of symbols) {
const quote = await fetchQuote(sym);
const row = document.createElement('tr');
const change = quote.d || 0;
const changePercent = quote.dp || 0;
const changeColor = change >= 0 ? 'var(--green)' : 'var(--red)';
row.innerHTML = '<td>' + sym + '</td><td>$' + (quote.c || 0).toFixed(2) + '</td><td style="color:' + changeColor + '">' + (changePercent >= 0 ? '+' : '') + changePercent.toFixed(2) + '%</td><td>' + (Math.random() * 100).toFixed(0) + '</td><td>' + (Math.random() * 100).toFixed(0) + '</td><td>ACTIVE</td>';
tbody.appendChild(row);
}
}

function addLogEntry(containerId, message) {
const container = document.getElementById(containerId);
const entry = document.createElement('div');
entry.className = 'log-entry';
entry.textContent = message;
container.insertBefore(entry, container.firstChild);
if (container.children.length > 5) {
container.removeChild(container.lastChild);
}
}

function updateLogs() {
const darkPoolMessages = [
'NVDA: 15.2M shares @ $135.45 (BATS)',
'TSLA: 8.7M shares @ $245.12 (DARK)',
'AAPL: 22.1M shares @ $178.34 (BLOCK)'
];
const algoMessages = [
'MOMENTUM: BUY signal detected on NVDA',
'MEAN REVERSION: Oversold condition TSLA',
'BREAKOUT: Price action above resistance AAPL'
];
const darkMsg = darkPoolMessages[Math.floor(Math.random() * darkPoolMessages.length)];
const algoMsg = algoMessages[Math.floor(Math.random() * algoMessages.length)];
addLogEntry('darkpool-feed', darkMsg);
addLogEntry('algo-log', algoMsg);
}

document.addEventListener('DOMContentLoaded', function() {
initChart();
loadChart(currentSymbol, '60');
updateWatchlist();
updateLogs();
setInterval(updateLogs, 5000);
setInterval(updateWatchlist, 30000);
document.querySelectorAll('.time-tab').forEach(tab => {
tab.addEventListener('click', function() {
document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
this.classList.add('active');
const period = this.getAttribute('data-period');
const resolutionMap = { '1m': '1', '5m': '5', '1h': '60', 'D': 'D' };
loadChart(currentSymbol, resolutionMap[period]);
});
});
document.getElementById('tickerInput').addEventListener('keypress', function(e) {
if (e.key === 'Enter') {
const symbol = this.value.toUpperCase();
if (symbol) {
currentSymbol = symbol;
document.getElementById('currentTicker').textContent = symbol;
loadChart(symbol, '60');
}
}
});
});
</script>
</body>
</html>
